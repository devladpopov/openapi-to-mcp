name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run tests (includes e2e generate + install + tsc)
        run: bun test

      - name: Build
        run: bun run build

      - name: Smoke test CLI
        run: node dist/cli.js generate tests/fixtures/petstore.yaml -o /tmp/smoke --name Smoke
        if: runner.os != 'Windows'

      - name: Smoke test CLI (Windows)
        run: node dist/cli.js generate tests/fixtures/petstore.yaml -o "$env:TEMP\smoke" --name Smoke
        if: runner.os == 'Windows'
